<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(99,179,237,0.12);
    --accent: #38bdf8;
    --accent2: #818cf8;
    --accent3: #34d399;
    --accent4: #fb923c;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .logo-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; box-shadow: 0 0 24px rgba(56,189,248,0.35); }
  h1 { font-family: 'Prompt', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1.2; }
  h1 span { display: block; font-size: 0.85rem; font-weight: 300; color: var(--accent); letter-spacing: 0.08em; margin-top: 2px; }
  .badge { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.3); color: var(--accent); padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-bottom: 2rem; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem 1.75rem; position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
  .kpi-card:hover { transform: translateY(-3px); border-color: rgba(56,189,248,0.3); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; }
  .kpi-card.blue::before  { background: var(--accent); } .kpi-card.purple::before { background: var(--accent2); } .kpi-card.green::before  { background: var(--accent3); } .kpi-card.orange::before { background: var(--accent4); }
  .kpi-icon { font-size: 1.8rem; margin-bottom: 0.75rem; }
  .kpi-value { font-family: 'Prompt', sans-serif; font-size: 2.4rem; font-weight: 700; line-height: 1; color: #fff; margin-bottom: 0.35rem; }
  .kpi-value .unit { font-size: 1rem; font-weight: 400; color: var(--muted); margin-left: 4px; }
  .kpi-label { font-size: 0.85rem; color: var(--muted); font-weight: 400; }
  .kpi-sub { margin-top: 0.75rem; font-size: 0.78rem; padding: 0.3rem 0.7rem; border-radius: 6px; display: inline-block; }
  .kpi-card.blue .kpi-sub   { background: rgba(56,189,248,0.1);  color: var(--accent); } .kpi-card.purple .kpi-sub { background: rgba(129,140,248,0.1); color: var(--accent2); } .kpi-card.green .kpi-sub  { background: rgba(52,211,153,0.1);  color: var(--accent3); } .kpi-card.orange .kpi-sub { background: rgba(251,146,60,0.1);  color: var(--accent4); }

  /* Charts & Layout */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
  .chart-full { grid-column: 1 / -1; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .card-title { font-family: 'Prompt', sans-serif; font-size: 1rem; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
  .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .card-tag { font-size: 0.75rem; color: var(--muted); background: var(--surface2); padding: 0.25rem 0.65rem; border-radius: 6px; }
  canvas { max-height: 300px; }
