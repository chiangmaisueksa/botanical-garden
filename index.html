<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบฐานข้อมูลสวนพฤกษศาสตร์โรงเรียน จังหวัดเชียงใหม่</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
      body {
        font-family: 'Kanit', sans-serif;
        background-color: #f4f8fb; /* พื้นหลังสีฟ้าอ่อนสว่าง สบายตา */
        color: #333333;
      }
      .main-header {
        /* ไล่สีจากน้ำเงินเข้ม (Navy) ไปฟ้า (Blue) */
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        color: #ffffff;
        padding: 35px 20px;
        border-radius: 0 0 25px 25px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        border-bottom: 4px solid #4ca1af;
      }
      .main-card {
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.04);
        padding: 30px;
        margin-bottom: 30px;
        border: 1px solid #e1e8ed;
      }
      .filter-section {
        background-color: #eef5fc; /* พื้นหลังตัวกรองสีฟ้าพาสเทล */
        border-radius: 15px;
        padding: 25px;
        border: 1px solid #c9dff0;
      }
      .chart-container {
        position: relative;
        height: 280px;
        width: 100%;
      }
      /* ตกแต่งตารางโทนน้ำเงิน */
      .table-custom {
        border-radius: 12px;
        overflow: hidden;
      }
      .table-custom thead th {
        background-color: #1976d2 !important; /* สีน้ำเงินสว่าง */
        color: white !important;
        font-weight: 500;
        border-bottom: 3px solid #0d47a1 !important; /* ขอบล่างสีน้ำเงินเข้ม */
      }
      .table-hover tbody tr:hover {
        background-color: #e3f2fd !important; /* ไฮไลต์สีฟ้าอ่อนเมื่อเอาเมาส์ชี้ */
      }
      /* ตกแต่งช่อง Dropdown */
      .select-blue { border: 1px solid #90caf9; border-radius: 10px; }
      .select-blue:focus { border-color: #1976d2; box-shadow: 0 0 0 0.25rem rgba(25, 118, 210, 0.25); }
    </style>
  </head>
  <body>

    <div class="main-header text-center">
      <h2 class="fw-bold mb-2">
        <i class="bi bi-tree text-info"></i> ฐานข้อมูลสวนพฤกษศาสตร์โรงเรียน
      </h2>
      <h5 class="fw-light text-light">จังหวัดเชียงใหม่</h5>
    </div>

    <div class="container mb-5">
      
      <div id="loadingWrapper" class="text-center my-5 main-card">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="text-primary mt-3 fw-bold">กำลังประมวลผลข้อมูลสารสนเทศ...</h5>
      </div>

      <div id="contentWrapper" class="d-none">
        
        <div class="row mb-4">
          <div class="col-lg-8 mb-3">
            <div class="main-card h-100">
              <h5 class="text-center mb-3 fw-bold" style="color: #1565c0;">
                <i class="bi bi-bar-chart-fill"></i> จำนวนสถานศึกษาแยกตาม อำเภอ/เขต
              </h5>
              <div class="chart-container">
                <canvas id="districtChart"></canvas>
              </div>
            </div>
          </div>
          
          <div class="col-lg-4 mb-3">
            <div class="main-card h-100">
              <h5 class="text-center mb-3 fw-bold" style="color: #0277bd;">
                <i class="bi bi-pie-chart-fill"></i> สัดส่วนตามสังกัด
              </h5>
              <div class="chart-container">
                <canvas id="agencyChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="filter-section shadow-sm mb-4">
          <h5 class="mb-3 fw-bold text-primary"><i class="bi bi-funnel"></i> ตัวกรองค้นหาข้อมูล</h5>
          <div class="row">
            <div class="col-md-4 mb-2">
              <label class="form-label fw-bold text-dark">สังกัด</label>
              <select id="agencyFilter" class="form-select select-blue">
                <option value="">-- แสดงทุกสังกัด --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label fw-bold text-dark">อำเภอ / เขต</label>
              <select id="districtFilter" class="form-select select-blue">
                <option value="">-- แสดงทุกอำเภอ --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label fw-bold text-dark">ตำบล / แขวง</label>
              <select id="subdistrictFilter" class="form-select select-blue">
                <option value="">-- แสดงทุกตำบล --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="main-card table-responsive">
          <table id="schoolTable" class="table table-hover table-bordered table-custom" style="width:100%">
          </table>
        </div>

      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
      $(document).ready(function() {
        let table;
        let districtChartInstance = null;
        let agencyChartInstance = null;

        // เรียกข้อมูลจากไฟล์ data.csv บนเซิร์ฟเวอร์โดยตรง
        const csvFileName = "data.csv";

        Papa.parse(csvFileName, {
          download: true,
          header: false,
          skipEmptyLines: 'greedy',
          complete: function(results) {
            const data = results.data;
            
            if (!data || data.length === 0) {
               $('#loadingWrapper').html('<div class="alert alert-danger">ไม่พบข้อมูลในไฟล์ data.csv</div>');
               return;
            }

            // ค้นหาบรรทัดที่เป็น Header จริงๆ จากไฟล์
            let headerIndex = data.findIndex(row => row.includes("ชื่อสถานศึกษา") || row[3] === "ชื่อสถานศึกษา");
            if(headerIndex === -1) {
              $('#loadingWrapper').html('<div class="alert alert-danger">เกิดข้อผิดพลาด: ไม่พบโครงสร้างตาราง (คำว่า "ชื่อสถานศึกษา") ในไฟล์ CSV</div>');
              return;
            }

            const headers = data[headerIndex];
            const rawRows = data.slice(headerIndex + 1);
            // คัดกรองเฉพาะแถวที่มีข้อมูลสมบูรณ์
            const validRows = rawRows.filter(row => row.length === headers.length && row[3] !== "");

            $('#loadingWrapper').slideUp();
            $('#contentWrapper').removeClass('d-none');

            // เริ่มต้นใช้งาน DataTables
            table = $('#schoolTable').DataTable({
              data: validRows,
              columns: headers.map(function(header) {
                return { title: header };
              }),
              language: {
                url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json',
                search: "ค้นหาชื่อโรงเรียน/ข้อมูลทั่วไป:"
              },
              pageLength: 20,
              responsive: true,
              lengthMenu: [[10, 20, 50, 100, -1], [10, 20, 50, 100, "ทั้งหมด"]]
            });

            // กำหนด Index คอลัมน์ (สังกัด=4, ตำบล=5, อำเภอ=6)
            const COL_AGENCY = 4;
            const COL_SUBDISTRICT = 5;
            const COL_DISTRICT = 6;

            // นำข้อมูลใส่ในช่องตัวกรอง Dropdown
            let agencies = [...new Set(validRows.map(item => item[COL_AGENCY]))].filter(x => x).sort();
            let districts = [...new Set(validRows.map(item => item[COL_DISTRICT]))].filter(x => x).sort();
            let subdistricts = [...new Set(validRows.map(item => item[COL_SUBDISTRICT]))].filter(x => x).sort();

            agencies.forEach(a => $('#agencyFilter').append(`<option value="${a}">${a}</option>`));
            districts.forEach(d => $('#districtFilter').append(`<option value="${d}">${d}</option>`));
            subdistricts.forEach(s => $('#subdistrictFilter').append(`<option value="${s}">${s}</option>`));

            // ชุดสีโทน ฟ้า-น้ำเงิน
            const bluePalette = [
              '#0d47a1', '#1565c0', '#1976d2', '#1e88e5', '#2196f3', '#42a5f5', '#64b5f6', 
              '#90caf9', '#0277bd', '#0288d1', '#039be5', '#03a9f4', '#29b6f6', '#4fc3f7'
            ];

            // ฟังก์ชันวาดแดชบอร์ดกราฟ
            function renderCharts() {
              let filteredData = table.rows({search: 'applied'}).data().toArray();
              let agencyCounts = {};
              let districtCounts = {};
              
              filteredData.forEach(row => {
                let agency = row[COL_AGENCY];
                let dist = row[COL_DISTRICT];
                if(agency) agencyCounts[agency] = (agencyCounts[agency] || 0) + 1;
                if(dist) districtCounts[dist] = (districtCounts[dist] || 0) + 1;
              });

              // กราฟแท่งอำเภอ
              let sortedDistricts = Object.entries(districtCounts).sort((a, b) => b[1] - a[1]);
              let barColors = sortedDistricts.map((_, index) => bluePalette[index % bluePalette.length]);

              if (districtChartInstance) districtChartInstance.destroy();
              let ctxDist = document.getElementById('districtChart').getContext('2d');
              districtChartInstance = new Chart(ctxDist, {
                type: 'bar',
                data: {
                  labels: sortedDistricts.map(item => item[0]),
                  datasets: [{
                    label: 'จำนวนสถานศึกษา',
                    data: sortedDistricts.map(item => item[1]),
                    backgroundColor: barColors,
                    borderRadius: 6,
                    barThickness: 'flex',
                    maxBarThickness: 35
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: 'Kanit'} } },
                    x: { ticks: { font: {family: 'Kanit', size: 11} } }
                  }
                }
              });

              // กราฟโดนัทสังกัด
              let agencyLabels = Object.keys(agencyCounts);
              let agencyData = Object.values(agencyCounts);
              if (agencyChartInstance) agencyChartInstance.destroy();
              let ctxAgency = document.getElementById('agencyChart').getContext('2d');
              agencyChartInstance = new Chart(ctxAgency, {
                type: 'doughnut',
                data: {
                  labels: agencyLabels,
                  datasets: [{
                    data: agencyData,
                    backgroundColor: bluePalette.slice(0, agencyLabels.length),
                    borderWidth: 2,
                    borderColor: '#ffffff'
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { 
                      position: 'bottom', 
                      labels: { font: {family: 'Kanit', size: 12}, boxWidth: 12 } 
                    }
                  }
                }
              });
            }

            // วาดกราฟเมื่อโหลดหน้าเว็บครั้งแรก
            renderCharts
