<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบรายงานสารสนเทศ สวนพฤกษศาสตร์โรงเรียน จังหวัดเชียงใหม่</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
      body {
        font-family: 'Kanit', sans-serif;
        background-color: #f8fafc; /* พื้นหลังสไตล์ Dashboard สากล */
        color: #1e293b;
      }
      .main-header {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); /* สีกรมท่าลึกแบบหรูหรา */
        color: #ffffff;
        padding: 40px 20px;
        border-radius: 0 0 20px 20px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        margin-bottom: 35px;
      }
      .main-card {
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        padding: 25px;
        margin-bottom: 30px;
        border: 1px solid #e2e8f0;
      }
      .filter-section {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 25px;
        border: 1px solid #cbd5e1;
      }
      .chart-container {
        position: relative;
        height: 280px;
        width: 100%;
      }
      /* ปรับตารางแบบมืออาชีพ */
      .table-custom {
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
      }
      .table-custom thead th {
        background-color: #1e293b !important; /* สีกรมท่าสากล */
        color: #ffffff !important;
        font-weight: 500;
        font-size: 15px;
        border-bottom: none !important;
        padding: 14px 10px !important;
      }
      .table-custom tbody td {
        padding: 12px 10px !important;
        font-size: 14.5px;
        color: #334155;
      }
      .table-hover tbody tr:hover {
        background-color: #f1f5f9 !important; /* สีไฮไลต์แบบนุ่มนวล */
      }
      /* คุมหน้าตาของฟอร์มเลือก */
      .form-select, .form-control {
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        color: #334155;
        font-size: 14px;
        padding: 10px;
      }
      .form-select:focus, .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }
      .card-title-text {
        font-size: 16px;
        font-weight: 600;
        color: #0f172a;
        border-left: 4px solid #3b82f6;
        padding-left: 10px;
      }
    </style>
  </head>
  <body>

    <div class="main-header text-center">
      <h2 class="fw-bold mb-1">
        <i class="bi bi-pie-chart text-info"></i> ระบบรายงานสารสนเทศ สวนพฤกษศาสตร์โรงเรียน
      </h2>
      <h5 class="fw-light text-slate-400" style="color: #94a3b8;">จังหวัดเชียงใหม่</h5>
    </div>

    <div class="container mb-5">
      
      <div id="loadingWrapper" class="text-center my-5 main-card">
        <div class="spinner-border text-secondary" role="status" style="width: 2.5rem; height: 2.5rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="text-secondary mt-3">กำลังประมวลผลข้อมูลโครงสร้างแดชบอร์ด...</h5>
      </div>

      <div id="contentWrapper" class="d-none">
        
        <div class="row mb-4">
          <div class="col-lg-8 mb-3">
            <div class="main-card h-100">
              <h5 class="card-title-text mb-4">
                จำนวนสถานศึกษาแยกตาม อำเภอ/เขต
              </h5>
              <div class="chart-container">
                <canvas id="districtChart"></canvas>
              </div>
            </div>
          </div>
          
          <div class="col-lg-4 mb-3">
            <div class="main-card h-100">
              <h5 class="card-title-text mb-4">
                สัดส่วนจำแนกตามสังกัด
              </h5>
              <div class="chart-container">
                <canvas id="agencyChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="filter-section shadow-sm mb-4">
          <h5 class="mb-3 fw-bold text-dark" style="font-size: 16px;"><i class="bi bi-sliders"></i> ฟิลเตอร์การคัดกรองข้อมูล</h5>
          <div class="row">
            <div class="col-md-4 mb-2">
              <label class="form-label small fw-medium text-secondary">หน่วยงานสังกัด</label>
              <select id="agencyFilter" class="form-select">
                <option value="">-- แสดงทุกสังกัด --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label small fw-medium text-secondary">อำเภอ / เขต</label>
              <select id="districtFilter" class="form-select">
                <option value="">-- แสดงทุกอำเภอ --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label small fw-medium text-secondary">ตำบล / แขวง</label>
              <select id="subdistrictFilter" class="form-select">
                <option value="">-- แสดงทุกตำบล --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="main-card table-responsive">
          <table id="schoolTable" class="table table-hover table-bordered table-custom" style="width:100%">
          </table>
        </div>

      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
      $(document).ready(function() {
        let table;
        let districtChartInstance = null;
        let agencyChartInstance = null;

        const csvFileName = "data.csv";

        Papa.parse(csvFileName, {
          download: true,
          header: false,
          skipEmptyLines: 'greedy',
          complete: function(results) {
            const data = results.data;
            
            if (!data || data.length === 0) {
               $('#loadingWrapper').html('<div class="alert alert-danger">ไม่พบข้อมูลในไฟล์ data.csv</div>');
               return;
            }

            let headerIndex = data.findIndex(row => row.includes("ชื่อสถานศึกษา") || row[3] === "ชื่อสถานศึกษา");
            if(headerIndex === -1) {
              $('#loadingWrapper').html('<div class="alert alert-danger">โครงสร้างตารางไม่ถูกต้อง ไม่พบหัวข้อหลักในไฟล์ข้อมูล</div>');
              return;
            }

            const headers = data[headerIndex];
            const rawRows = data.slice(headerIndex + 1);
            const validRows = rawRows.filter(row => row.length === headers.length && row[3] !== "");

            $('#loadingWrapper').slideUp();
            $('#contentWrapper').removeClass('d-none');

            table = $('#schoolTable').DataTable({
              data: validRows,
              columns: headers.map(function(header) {
                return { title: header };
              }),
              language: {
                url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json',
                search: "ค้นหาด่วน (Quick Search):"
              },
              pageLength: 20,
              responsive: true,
              lengthMenu: [[10, 20, 50, 100, -1], [10, 20, 50, 100, "ทั้งหมด"]]
            });

            const COL_AGENCY = 4;
            const COL_SUBDISTRICT = 5;
            const COL_DISTRICT = 6;

            let agencies = [...new Set(validRows.map(item => item[COL_AGENCY]))].filter(x => x).sort();
            let districts = [...new Set(validRows.map(item => item[COL_DISTRICT]))].filter(x => x).sort();
            let subdistricts = [...new Set(validRows.map(item => item[COL_SUBDISTRICT]))].filter(x => x).sort();

            agencies.forEach(a => $('#agencyFilter').append(`<option value="${a}">${a}</option>`));
            districts.forEach(d => $('#districtFilter').append(`<option value="${d}">${d}</option>`));
            subdistricts.forEach(s => $('#subdistrictFilter').append(`<option value="${s}">${s}</option>`));

            // พาเลตสีสากลระดับพรีเมียม (Professional Blues & Slates)
            const professionalPalette = [
              '#1e3a8a', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#1d4ed8', '#1e40af', 
              '#0284c7', '#0369a1', '#0f172a', '#334155', '#475569', '#64748b'
            ];

            function renderCharts() {
              let filteredData = table.rows({search: 'applied'}).data().toArray();
              let agencyCounts = {};
              let districtCounts = {};
              
              filteredData.forEach(row => {
                let agency = row[COL_AGENCY];
                let dist = row[COL_DISTRICT];
                if(agency) agencyCounts[agency] = (agencyCounts[agency] || 0) + 1;
                if(dist) districtCounts[dist] = (districtCounts[dist] || 0) + 1;
              });

              // กราฟแท่ง (อำเภอ)
              let sortedDistricts = Object.entries(districtCounts).sort((a, b) => b[1] - a[1]);
              let barColors = sortedDistricts.map((_, index) => professionalPalette[index % professionalPalette.length]);

              if (districtChartInstance) districtChartInstance.destroy();
              let ctxDist = document.getElementById('districtChart').getContext('2d');
              districtChartInstance = new Chart(ctxDist, {
                type: 'bar',
                data: {
                  labels: sortedDistricts.map(item => item[0]),
                  datasets: [{
                    label: 'จำนวนสถานศึกษา',
                    data: sortedDistricts.map(item => item[1]),
                    backgroundColor: barColors,
                    borderRadius: 4,
                    barThickness: 'flex',
                    maxBarThickness: 24
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                    y: { 
                      beginAtZero: true, 
                      grid: { color: '#f1f5f9' }, // เส้นตารางจางๆ แบบสะอาดตา
                      ticks: { stepSize: 1, font: {family: 'Kanit', size: 11}, color: '#64748b' } 
                    },
                    x: { 
                      grid: { display: false },
                      ticks: { font: {family: 'Kanit', size: 11}, color: '#475569' } 
                    }
                  }
                }
              });

              // กราฟโดนัท (สังกัด)
              let agencyLabels = Object.keys(agencyCounts);
              let agencyData = Object.values(agencyCounts);
              if (agencyChartInstance) agencyChartInstance.destroy();
              let ctxAgency = document.getElementById('agencyChart').getContext('2d');
              agencyChartInstance = new Chart(ctxAgency, {
                type: 'doughnut',
                data: {
                  labels: agencyLabels,
                  datasets: [{
                    data: agencyData,
                    backgroundColor: professionalPalette.slice(0, agencyLabels.length),
                    borderWidth: 2,
                    borderColor: '#ffffff'
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { 
                      position: 'bottom', 
                      labels: { font: {family: 'Kanit', size: 11}, boxWidth: 12, color: '#334155' } 
                    }
                  }
                }
              });
            }

            renderCharts();

            // ตัวควบคุม Dropdown Filters
            $('#agencyFilter').on('change', function() {
              let val = $.fn.dataTable.util.escapeRegex($(this).val());
              table.column(COL_AGENCY).search(val ? '^' + val + '$' : '', true, false).draw();
            });

            $('#districtFilter').on('change', function() {
              let val = $.fn.dataTable.util.escapeRegex($(this).val());
              table.column(COL_DISTRICT).search(val ? '^' + val + '$' : '', true, false).draw();
            });

            $('#subdistrictFilter').on('change', function() {
              let val = $.fn.dataTable.util.escapeRegex($(this).val());
              table.column(COL_SUBDISTRICT).search(val ? '^' + val + '$' : '', true, false).draw();
            });

            table.on('search.dt', function() { renderCharts(); });

          },
          error: function(err) {
            $('#loadingWrapper').html('<div class="alert alert-danger">เกิดข้อผิดพลาดในการโหลดไฟล์ข้อมูล กรุณาตรวจสอบการเชื่อมโยงเครือข่าย</div>');
          }
        });
      });
    </script>
  </body>
</html>
