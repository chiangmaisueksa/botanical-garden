<script>
Chart.defaults.color = '#64748b';
Chart.defaults.font.family = "'Sarabun', sans-serif";

const ACCENT  = '#38bdf8';
const PURPLE  = '#818cf8';
const GREEN   = '#34d399';
const ORANGE  = '#fb923c';
const GOLD    = '#fbbf24';
const PINK    = '#f472b6';
const TEAL    = '#2dd4bf';
const donutColors = [ACCENT, PURPLE, GREEN, ORANGE, GOLD, PINK, TEAL];

let globalData = [];
let chartInstances = {};

// ตัวแปรสำหรับเก็บชื่อคอลัมน์ที่ระบบค้นพบอัตโนมัติ
let csvKeys = {
  id: '',
  name: '',
  sangkad: '',
  amphoe: '',
  date: ''
};

// 1. ดึงข้อมูลและประมวลผลผ่าน PapaParse
Papa.parse('data.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    if (results.data.length > 0) {
      // ค้นหาหัวคอลัมน์ที่แท้จริงจากไฟล์ CSV (ป้องกันปัญหาพิมพ์ไม่ตรงหรือมีเว้นวรรค)
      const headers = Object.keys(results.data[0]);
      csvKeys.id = headers.find(h => h.includes('รหัส')) || headers[0];
      csvKeys.name = headers.find(h => h.includes('ชื่อสถานศึกษา') || h.includes('โรงเรียน') || h.includes('ชื่อ')) || headers[1];
      csvKeys.sangkad = headers.find(h => h.includes('สังกัด') || h.includes('หน่วยงาน')) || headers[2];
      csvKeys.amphoe = headers.find(h => h.includes('อำเภอ') || h.includes('เขต')) || headers[3];
      csvKeys.date = headers.find(h => h.includes('วันที่') || h.includes('เวลา')) || headers[4];

      // กรองเอาเฉพาะแถวที่มีข้อมูลชื่อโรงเรียน
      globalData = results.data.filter(row => row[csvKeys.name]); 
      processData(globalData);
      renderSearchTable(globalData); 
    }
  },
  error: function(err) {
    console.error("เกิดข้อผิดพลาดในการอ่านไฟล์ CSV:", err);
    alert("ไม่สามารถโหลด data.csv ได้");
  }
});

// 2. คำนวณข้อมูลจาก CSV
function processData(data) {
  const total = data.length;
  document.getElementById('kpi-total').innerText = total;

  const yearCounts = {};
  const sangkadCounts = {};
  const amphoeCounts = {};

  data.forEach(row => {
    // ดึงปี พ.ศ. จากคอลัมน์วันที่
    const dateStr = row[csvKeys.date] || '';
    const parts = dateStr.trim().split(' ');
    const year = parts[parts.length - 1]; 
    if (year && !isNaN(year)) {
      yearCounts[year] = (yearCounts[year] || 0) + 1;
    }

    // จัดกลุ่มสังกัด
    const sangkad = (row[csvKeys.sangkad] || 'อื่นๆ').trim();
    if(sangkad) sangkadCounts[sangkad] = (sangkadCounts[sangkad] || 0) + 1;

    // จัดกลุ่มอำเภอ
    const amphoeRaw = (row[csvKeys.amphoe] || 'ไม่ระบุ').trim();
    // ตัดคำว่า "อำเภอ" ออกเพื่อความสวยงามบนกราฟ (ถ้ามี) เช่น "อำเภอเมือง" -> "เมือง"
    const amphoe = amphoeRaw.replace(/^อำเภอ/, '').trim();
    
    if (amphoe && amphoe !== 'ไม่ระบุ' && amphoe !== '-') {
      amphoeCounts[amphoe] = (amphoeCounts[amphoe] || 0) + 1;
    }
  });

  // เตรียมข้อมูลกราฟปี
  const sortedYears = Object.keys(yearCounts).sort();
  const yearValues = sortedYears.map(y => yearCounts[y]);
  const maxYear = sortedYears[sortedYears.length - 1] || '-';
  
  document.getElementById('kpi-new').innerText = yearCounts[maxYear] || 0;
  document.getElementById('kpi-new-label').innerText = `สมาชิกใหม่ปี ${maxYear}`;

  // เรียงลำดับข้อมูลจากมากไปน้อย
  const sangkadArr = Object.keys(sangkadCounts).map(k => ({name: k, count: sangkadCounts[k]})).sort((a,b) => b.count - a.count);
  const amphoeArr = Object.keys(amphoeCounts).map(k => ({name: k, count: amphoeCounts[k]})).sort((a,b) => b.count - a.count);

  document.getElementById('kpi-sangkad').innerText = sangkadArr.length;
  document.getElementById('kpi-amphoe').innerText = amphoeArr.length;

  renderCharts(sortedYears, yearValues, sangkadArr, amphoeArr);
  renderSangkadList(sangkadArr);
  renderAmphoeTable(amphoeArr, total);
}

// 3. ฟังก์ชันวาดกราฟ
function renderCharts(years, yearVals, sangkadArr, amphoeArr) {
  // กราฟปี
  if(chartInstances.year) chartInstances.year.destroy();
  chartInstances.year = new Chart(document.getElementById('yearChart'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{
        label: 'จำนวนสมาชิกใหม่',
        data: yearVals,
        backgroundColor: yearVals.map((v, i) => i === yearVals.length - 1 ? 'rgba(251,191,36,0.85)' : 'rgba(56,189,248,0.6)'),
        borderColor: yearVals.map((v, i) => i === yearVals.length - 1 ? '#fbbf24' : ACCENT),
        borderWidth: 1.5,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(99,179,237,0.06)' } },
        y: { grid: { color: 'rgba(99,179,237,0.08)' } }
      }
    }
  });

  // กราฟสัดส่วนสังกัดหลัก (Donut)
  const top6 = sangkadArr.slice(0, 6);
  const rest = sangkadArr.slice(6).reduce((a, b) => a + b.count, 0);
  if(chartInstances.donut) chartInstances.donut.destroy();
  chartInstances.donut = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: [...top6.map(d => d.name), 'อื่นๆ'],
      datasets: [{
        data: [...top6.map(d => d.count), rest],
        backgroundColor: [...donutColors.slice(0,6), '#334155'],
        borderColor: '#111827',
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      cutout: '62%',
      plugins: {
        legend: { position: 'right', labels: { boxWidth: 12, padding: 10, font: { size: 11 } } }
      }
    }
  });

  // กราฟอำเภอ Top 15
  const top15Amphoe = amphoeArr.slice(0, 15);
  if(chartInstances.amphoe) chartInstances.amphoe.destroy();
  chartInstances.amphoe = new Chart(document.getElementById('amphoeChart'), {
    type: 'bar',
    data: {
      labels: top15Amphoe.map(d => d.name),
      datasets: [{
        data: top15Amphoe.map(d => d.count),
        backgroundColor: top15Amphoe.map((_, i) => `hsla(${170 + i * 8}, 70%, 55%, 0.75)`),
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(99,179,237,0.07)' }, ticks: { font: { size: 10 } } },
        y: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

// 4. เรนเดอร์รายการสังกัดทั้งหมด
function renderSangkadList(sangkadArr) {
  const maxCount = sangkadArr[0]?.count || 1;
  const list = document.getElementById('sangkadList');
  const barColors = [ACCENT, PURPLE, GREEN, ORANGE, GOLD, PINK, TEAL, '#e879f9', '#a78bfa', '#67e8f9', '#86efac', '#fca5a5'];
  
  list.innerHTML = '';
  sangkadArr.forEach((d, i) => {
    const pct = (d.count / maxCount * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'sangkad-row';
    row.innerHTML = `
      <div class="sangkad-name" title="${d.name}">${d.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%;background:${barColors[i%barColors.length]}" data-w="${pct}%"></div>
      </div>
      <div class="sangkad-count">${d.count}</div>
    `;
    list.appendChild(row);
  });

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.w; });
  }, 100);
}

// 5. เรนเดอร์ตารางอันดับอำเภอ Top 10
function renderAmphoeTable(amphoeArr, total) {
  const tbody = document.querySelector('#amphoeTable tbody');
  tbody.innerHTML = '';
  amphoeArr.slice(0, 10).forEach((d, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
    const pct = (d.count / total * 100).toFixed(1);
    const pillColor = i < 3 ? `background:rgba(56,189,248,0.12);color:var(--accent)` : `background:var(--surface2);color:var(--muted)`;
    tbody.innerHTML += `
      <tr>
        <td><span class="rank ${rankClass}">${i+1}</span></td>
        <td>${d.name}</td>
        <td style="font-weight:600;color:#fff">${d.count}</td>
        <td><span class="pill" style="${pillColor}">${pct}%</span></td>
      </tr>
    `;
  });
}

// 6. เรนเดอร์ตารางค้นหาโรงเรียน
const searchInput = document.getElementById('searchInput');
const searchTbody = document.querySelector('#searchTable tbody');

function renderSearchTable(dataToRender) {
  searchTbody.innerHTML = '';
  dataToRender.slice(0, 50).forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row[csvKeys.id] || '-'}</td>
      <td style="color:#fff; font-weight:500;">${row[csvKeys.name] || '-'}</td>
      <td>${row[csvKeys.sangkad] || '-'}</td>
      <td>${row[csvKeys.amphoe] || '-'}</td>
      <td>${row[csvKeys.date] || '-'}</td>
    `;
    searchTbody.appendChild(tr);
  });

  if (dataToRender.length === 0) {
    searchTbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem; color:var(--muted);">ไม่พบข้อมูลสถานศึกษาที่ค้นหา</td></tr>`;
  }
}

// ค้นหาแบบ Real-time
searchInput.addEventListener('input', (e) => {
  const keyword = e.target.value.toLowerCase().trim();
  const filteredData = globalData.filter(row => {
    const name = (row[csvKeys.name] || '').toLowerCase();
    const amphoe = (row[csvKeys.amphoe] || '').toLowerCase();
    return name.includes(keyword) || amphoe.includes(keyword); // ค้นหาได้ทั้งจากชื่อโรงเรียนและชื่ออำเภอ
  });
  renderSearchTable(filteredData);
});
</script>
