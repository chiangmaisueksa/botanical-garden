<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบฐานข้อมูลสวนพฤกษศาสตร์โรงเรียน จังหวัดเชียงใหม่</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
      :root {
        --primary-green: #2e7d32; /* เขียวเข้ม */
        --light-green: #e8f5e9;  /* เขียวอ่อน (พื้นหลัง) */
        --primary-blue: #1565c0;  /* ฟ้า/น้ำเงิน */
        --light-blue: #e3f2fd;    /* ฟ้าอ่อน */
        --white: #ffffff;
      }
      body {
        font-family: 'Kanit', sans-serif;
        background-color: #f0f8f1; /* สีพื้นหลังขาวอมเขียวสบายตา */
        color: #333;
      }
      .main-header {
        background: linear-gradient(135deg, var(--primary-green), var(--primary-blue));
        color: var(--white);
        padding: 30px 20px;
        border-radius: 0 0 25px 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        margin-bottom: 30px;
      }
      .main-card {
        background-color: var(--white);
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        padding: 25px;
        margin-bottom: 30px;
      }
      .filter-section {
        background-color: var(--light-green);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #c8e6c9;
      }
      .chart-container {
        position: relative;
        height: 280px;
        width: 100%;
      }
      /* ตกแต่งตาราง */
      .table-custom thead th {
        background-color: var(--primary-green) !important;
        color: var(--white) !important;
        font-weight: 500;
        border-bottom: 3px solid var(--primary-blue) !important;
      }
      .table-hover tbody tr:hover {
        background-color: var(--light-blue) !important;
      }
      .form-select, .form-control {
        border-radius: 8px;
      }
    </style>
  </head>
  <body>

    <div class="main-header text-center">
      <h2 class="fw-bold mb-2"><i class="bi bi-tree-fill text-light"></i> ฐานข้อมูลสวนพฤกษศาสตร์โรงเรียน</h2>
      <h5 class="fw-light">จังหวัดเชียงใหม่ (ข้อมูล ณ วันที่ ๒๐ มีนาคม ๒๕๖๙)</h5>
    </div>

    <div class="container mb-5">
      
      <div id="loadingWrapper" class="text-center my-5 main-card">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="text-success mt-3">กำลังดึงข้อมูลเข้าสู่ระบบ...</h5>
      </div>

      <div id="contentWrapper" class="d-none">
        
        <div class="row mb-4">
          <div class="col-lg-8 mb-3">
            <div class="main-card h-100">
              <h5 class="text-center mb-3 text-success fw-bold">
                <i class="bi bi-bar-chart-line-fill"></i> จำนวนสถานศึกษาแยกตาม อำเภอ/เขต
              </h5>
              <div class="chart-container">
                <canvas id="districtChart"></canvas>
              </div>
            </div>
          </div>
          
          <div class="col-lg-4 mb-3">
            <div class="main-card h-100">
              <h5 class="text-center mb-3 text-primary fw-bold">
                <i class="bi bi-pie-chart-fill"></i> สัดส่วนตามสังกัด
              </h5>
              <div class="chart-container">
                <canvas id="agencyChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="filter-section shadow-sm mb-4">
          <h5 class="text-success mb-3 fw-bold"><i class="bi bi-funnel-fill"></i> ตัวกรองค้นหาข้อมูล</h5>
          <div class="row">
            <div class="col-md-4 mb-2">
              <label class="form-label text-primary fw-bold">สังกัด</label>
              <select id="agencyFilter" class="form-select border-primary">
                <option value="">-- แสดงทุกสังกัด --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label text-success fw-bold">อำเภอ / เขต</label>
              <select id="districtFilter" class="form-select border-success">
                <option value="">-- แสดงทุกอำเภอ --</option>
              </select>
            </div>
            <div class="col-md-4 mb-2">
              <label class="form-label text-info fw-bold">ตำบล / แขวง</label>
              <select id="subdistrictFilter" class="form-select border-info">
                <option value="">-- แสดงทุกตำบล --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="main-card table-responsive">
          <table id="schoolTable" class="table table-hover table-bordered table-custom" style="width:100%">
          </table>
        </div>

      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
      $(document).ready(function() {
        let table;
        let districtChartInstance = null;
        let agencyChartInstance = null;

        // ชื่อไฟล์ CSV ที่อยู่บน GitHub ของคุณ
        const csvFileName = "สวนพฤก20มีค69.csv";

        Papa.parse(csvFileName, {
          download: true, 
          header: false,
          skipEmptyLines: 'greedy',
          complete: function(results) {
            const data = results.data;
            
            // ค้นหาตำแหน่งบรรทัดที่เป็น Header จริงๆ (มีคำว่า "ชื่อสถานศึกษา")
            let headerIndex = data.findIndex(row => row.includes("ชื่อสถานศึกษา") || row[3] === "ชื่อสถานศึกษา");
            if(headerIndex === -1) {
              $('#loadingWrapper').html('<div class="alert alert-danger">เกิดข้อผิดพลาด: ไม่พบโครงสร้างตารางที่ถูกต้องในไฟล์ CSV</div>');
              return;
            }

            const headers = data[headerIndex];
            const rawRows = data.slice(headerIndex + 1);
            
            // กรองข้อมูลเฉพาะบรรทัดที่สมบูรณ์ (คอลัมน์ครบ และมีข้อมูลรหัส/ชื่อ)
            const validRows = rawRows.filter(row => row.length === headers.length && row[3]);

            $('#loadingWrapper').slideUp();
            $('#contentWrapper').removeClass('d-none');

            // 1. นำข้อมูลเข้า DataTables
            table = $('#schoolTable').DataTable({
              data: validRows,
              columns: headers.map(function(header) {
                return { title: header };
              }),
              language: {
                url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json',
                search: "ค้นหาชื่อโรงเรียน/ข้อมูลทั่วไป:" // เปลียนคำอธิบายช่องค้นหา
              },
              pageLength: 20,
              responsive: true,
              lengthMenu: [[10, 20, 50, 100, -1], [10, 20, 50, 10
